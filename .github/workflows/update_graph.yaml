name: Execute and Save Outputs

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy python-dxf protobuf

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache
          key: actions

      - name: Detect analysis mode
        id: detect-mode
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff HEAD~1 --name-only -- 'scripts/' 'public/' 2>/dev/null || echo "")
            if [ -n "$CHANGED" ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
              echo "ソースコード変更を検出: フルモードで実行します"
              echo "$CHANGED"
            else
              echo "mode=incremental" >> $GITHUB_OUTPUT
              echo "ソースコード変更なし: インクリメンタルモードで実行します"
            fi
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
            echo "スケジュール/手動実行: インクリメンタルモードで実行します"
          fi

      - name: Execute script
        run: |
          mkdir -p cache
          INCREMENTAL_FLAG=""
          if [ "${{ steps.detect-mode.outputs.mode }}" = "incremental" ]; then
            INCREMENTAL_FLAG="--incremental"
          fi
          python scripts/crane.py --github_token ${{ secrets.GH_PAT }} --github_actor ${{ github.actor }} $INCREMENTAL_FLAG
          python scripts/match_collector.py --github_token ${{ secrets.GH_PAT }} $INCREMENTAL_FLAG
          python scripts/goal_scene_collector.py --github_token ${{ secrets.GH_PAT }} $INCREMENTAL_FLAG
          cp github_action_data.json public/
          cp match_data.json public/
          cp goal_scenes.json public/
          cp github_action_data.json cache/
          cp match_data.json cache/
          cp goal_scenes.json cache/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Publish
        uses: actions/deploy-pages@v4
