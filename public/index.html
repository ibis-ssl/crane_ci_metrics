<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ibis-ssl/crane ビルド時間分析</title>
    <link
      href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <script
      type="text/javascript"
      src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <!-- ヘッダー -->
      <header class="page-header">
        <h1>ibis-ssl/crane ビルド時間分析</h1>
        <p class="subtitle">CI/CDパフォーマンス監視ダッシュボード</p>
        <ul class="metadata-badges">
          <li>
            <img
              alt="GitHub stars"
              src="https://img.shields.io/github/stars/ibis-ssl/crane"
            />
          </li>
          <li>
            <img
              alt="GitHub issues"
              src="https://img.shields.io/github/issues/ibis-ssl/crane"
            />
            <img
              alt="GitHub closed issues"
              src="https://img.shields.io/github/issues-closed/ibis-ssl/crane"
            />
          </li>
          <li>
            <img
              alt="GitHub PR"
              src="https://img.shields.io/github/issues-pr/ibis-ssl/crane"
            />
            <img
              alt="GitHub closed PR"
              src="https://img.shields.io/github/issues-pr-closed/ibis-ssl/crane"
            />
          </li>
        </ul>
      </header>

      <!-- サマリーカード -->
      <div class="summary-cards" id="summary-cards">
        <div class="summary-card">
          <div class="summary-card-label">総ビルド数</div>
          <div class="summary-card-value" id="total-builds">-</div>
          <div class="summary-card-subtitle">収集データポイント</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">平均ビルド時間</div>
          <div class="summary-card-value" id="average-duration">-</div>
          <div class="summary-card-subtitle">全ビルドの平均</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">最新ビルド</div>
          <div class="summary-card-value" id="latest-duration">-</div>
          <div class="summary-card-subtitle" id="latest-date">-</div>
        </div>
      </div>

      <!-- 総ビルド時間の推移 -->
      <div class="chart-card">
        <h2>総ビルド時間の推移（リリースビルド）</h2>
        <p class="chart-description">クリックでパッケージ詳細を表示</p>
        <div class="chart-container" id="build-time-chart"></div>
      </div>

      <!-- パッケージごとのビルド時間 -->
      <div class="chart-card">
        <h2>パッケージごとのビルド時間</h2>
        <p class="chart-description">特定ビルドにおけるパッケージ別ビルド時間の内訳</p>
        <select id="build-select" class="form-select">
          <option value="">ビルドを選択...</option>
        </select>
        <div class="chart-container" id="all-package-time-chart"></div>
        <div id="package-table"></div>
      </div>

      <!-- パッケージごとのビルド時間推移 -->
      <div class="chart-card">
        <h2>パッケージごとのビルド時間推移</h2>
        <p class="chart-description">特定パッケージのビルド時間の変化を追跡</p>
        <select id="package-select" class="form-select">
          <option value="">パッケージを選択...</option>
        </select>
        <div class="chart-container" id="package-time-chart"></div>
      </div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
