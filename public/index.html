<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ibis-ssl/crane Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <!-- ヘッダー -->
      <header class="page-header">
        <h1>ibis-ssl/crane Dashboard</h1>
        <p class="subtitle">CI/CD メトリクスと試合分析ポータル</p>
        <ul class="metadata-badges">
          <li>
            <img
              alt="GitHub stars"
              src="https://img.shields.io/github/stars/ibis-ssl/crane"
            />
          </li>
          <li>
            <img
              alt="GitHub issues"
              src="https://img.shields.io/github/issues/ibis-ssl/crane"
            />
            <img
              alt="GitHub closed issues"
              src="https://img.shields.io/github/issues-closed/ibis-ssl/crane"
            />
          </li>
          <li>
            <img
              alt="GitHub PR"
              src="https://img.shields.io/github/issues-pr/ibis-ssl/crane"
            />
            <img
              alt="GitHub closed PR"
              src="https://img.shields.io/github/issues-pr-closed/ibis-ssl/crane"
            />
          </li>
        </ul>
      </header>

      <!-- 試合分析 -->
      <section class="portal-section">
        <h2 class="portal-section-title">試合分析</h2>
        <div class="portal-grid">
          <a href="./match.html" class="portal-card">
            <div class="portal-card-icon">
              <i class="bi bi-trophy"></i>
            </div>
            <div class="portal-card-body">
              <div class="portal-card-title">TIGERs対戦統計</div>
              <p class="portal-card-desc">勝率・スコア推移・ファウル分析</p>
            </div>
            <span class="portal-card-arrow">→</span>
          </a>

          <a href="./goals.html" class="portal-card">
            <div class="portal-card-icon">
              <i class="bi bi-camera-video"></i>
            </div>
            <div class="portal-card-body">
              <div class="portal-card-title">ゴールシーン一覧</div>
              <p class="portal-card-desc">ゴール直前10秒のフィールドリプレイ</p>
            </div>
            <span class="portal-card-arrow">→</span>
          </a>

          <a href="./analysis-list.html" class="portal-card">
            <div class="portal-card-icon">
              <i class="bi bi-clipboard-data"></i>
            </div>
            <div class="portal-card-body">
              <div class="portal-card-title">試合ログ分析</div>
              <p class="portal-card-desc">実試合ログの詳細統計・ヒートマップ</p>
            </div>
            <span class="portal-card-arrow">→</span>
          </a>
        </div>
      </section>

      <!-- CI/CD & ツール -->
      <section class="portal-section">
        <div class="row g-4">
          <div class="col-md-6">
            <h2 class="portal-section-title">CI/CD</h2>
            <a href="./build.html" class="portal-card">
              <div class="portal-card-icon">
                <i class="bi bi-clock-history"></i>
              </div>
              <div class="portal-card-body">
                <div class="portal-card-title">ビルド時間分析</div>
                <p class="portal-card-desc">CI/CDビルド時間のパッケージ別推移</p>
              </div>
              <span class="portal-card-arrow">→</span>
            </a>
          </div>
          <div class="col-md-6">
            <h2 class="portal-section-title">ツール</h2>
            <a href="./player.html" class="portal-card">
              <div class="portal-card-icon">
                <i class="bi bi-play-circle"></i>
              </div>
              <div class="portal-card-body">
                <div class="portal-card-title">ログプレイヤー</div>
                <p class="portal-card-desc">.log.gz ファイルの試合リプレイ再生</p>
              </div>
              <span class="portal-card-arrow">→</span>
            </a>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
