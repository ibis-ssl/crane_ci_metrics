<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ibis-ssl/crane TIGERs対戦統計</title>
    <link
      href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <script
      type="text/javascript"
      src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <!-- ヘッダー -->
      <header class="page-header">
        <h1>ibis-ssl/crane TIGERs対戦統計</h1>
        <p class="subtitle">match-vs-tigers CI 対戦結果分析ダッシュボード</p>
        <nav class="page-nav">
          <a href="./index.html" class="nav-link">← ビルド時間分析へ</a>
        </nav>
      </header>

      <!-- サマリーカード -->
      <div class="summary-cards" id="summary-cards">
        <div class="summary-card">
          <div class="summary-card-label">総試合数</div>
          <div class="summary-card-value" id="total-matches">-</div>
          <div class="summary-card-subtitle">収集データポイント</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">勝率</div>
          <div class="summary-card-value" id="win-rate">-</div>
          <div class="summary-card-subtitle">CRANE WIN</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">戦績 (W / L / D)</div>
          <div class="summary-card-value" id="win-loss-draw">-</div>
          <div class="summary-card-subtitle">勝利 / 敗北 / 引き分け</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">最新結果</div>
          <div class="summary-card-value" id="latest-result">-</div>
          <div class="summary-card-subtitle" id="latest-date">-</div>
        </div>
      </div>

      <!-- スコア推移 -->
      <div class="chart-card">
        <h2>スコア推移</h2>
        <p class="chart-description">試合ごとのゴール数の推移</p>
        <div class="chart-container" id="score-history-chart"></div>
      </div>

      <!-- 勝敗分布 -->
      <div class="chart-card">
        <h2>勝敗分布</h2>
        <p class="chart-description">全試合の勝敗内訳</p>
        <div class="chart-container" id="result-distribution-chart"></div>
      </div>

      <!-- ファウル比較 -->
      <div class="chart-card">
        <h2>ファウル種別比較</h2>
        <p class="chart-description">全試合を通じたファウル種別ごとの累計回数</p>
        <div class="chart-container" id="foul-comparison-chart"></div>
      </div>

      <!-- 試合結果テーブル -->
      <div class="chart-card">
        <h2>試合結果一覧</h2>
        <p class="chart-description">全試合の詳細結果</p>
        <div id="match-table"></div>
      </div>
    </div>
    <script src="./match.js"></script>
  </body>
</html>
