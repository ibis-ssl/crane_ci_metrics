<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ibis-ssl/crane ゴールシーン一覧</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link href="./styles.css" rel="stylesheet" />
    <link href="./goals.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <!-- ヘッダー -->
      <header class="page-header">
        <h1>ゴールシーン一覧</h1>
        <p class="subtitle">SSL game log から抽出したゴール直前10秒のシーン</p>
        <nav class="page-nav">
          <a href="./index.html" class="nav-link">← ビルド時間分析</a>
          <a href="./match.html" class="nav-link" style="margin-left: 8px;">TIGERs対戦統計 →</a>
        </nav>
      </header>

      <!-- フィルタ -->
      <div class="chart-card">
        <div class="goal-filter-bar">
          <label class="goal-filter-label">表示フィルタ</label>
          <div class="goal-filter-buttons" id="filter-buttons">
            <button class="goal-filter-btn active" data-filter="all">すべて</button>
            <button class="goal-filter-btn" data-filter="ibis">ibis ゴール</button>
            <button class="goal-filter-btn" data-filter="tigers">TIGERs ゴール</button>
          </div>
          <span class="goal-count" id="goal-count"></span>
        </div>
      </div>

      <!-- ゴールシーンカード一覧 -->
      <div id="goal-scenes-container"></div>

      <!-- データなし / 読み込み中 -->
      <div id="loading-message" class="chart-card" style="text-align:center; padding: 48px;">
        <p style="color: var(--text-secondary);">データを読み込み中...</p>
      </div>
    </div>

    <script src="./goals.js"></script>
  </body>
</html>
